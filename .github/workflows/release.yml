name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v7
        with:
          node-version: 24
      - run: npm run build
      - run: node scripts/fetch-terser.mjs
      - run: npm run minify
      - run: npm run docs
      - run: npm test
      - run: npm run check
      - name: Verify tag and package versions
        run: test "${GITHUB_REF_NAME#v}" = "$(node -p "require('./package.json').version")"
      - run: npm run package:wordpress
      - run: npm pack
      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            dist/cleanselection.js
            dist/cleanselection.min.js
            cleanselection-*.tgz
            release/clean-selection-*.zip
