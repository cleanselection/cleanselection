name: Bug report
description: Report a reproducible Clean Selection problem.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not disclose security vulnerabilities here; use private vulnerability reporting.
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: 1.0.0
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Browser and operating system
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Include reduced HTML, configuration, and exact steps or a public reproduction URL.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
